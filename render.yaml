# Render Blueprint — describe los servicios para deploy automático.
# Ver: https://render.com/docs/blueprint-spec
#
# Cómo usar:
#   1. Subir este repo a GitHub.
#   2. En Render → "New" → "Blueprint" → conectar el repo.
#   3. Render lee este archivo y crea ambos servicios.
#   4. Llenar los valores marcados como sync: false en el dashboard (secretos).

services:
  # ─── Backend .NET 8 API ──────────────────────────────────────────────────────
  - type: web
    name: nutrigestion-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend/NutriGestion.Api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: MongoDb__ConnectionString
        sync: false                # Pegar manualmente en el dashboard (secreto)
      - key: MongoDb__DatabaseName
        value: nutrigestion
      - key: Jwt__Secret
        generateValue: true        # Render genera un secret aleatorio seguro
      - key: Jwt__Issuer
        value: nutrigestion-api
      - key: Jwt__Audience
        value: nutrigestion-web
      - key: Jwt__ExpiresInHours
        value: "8"
      - key: Cors__AllowedOrigins
        # Después del primer deploy, reemplaza por la URL pública del frontend
        # (ej: https://nutrigestion-web.onrender.com)
        sync: false

  # ─── Frontend React/Vite (estático) ──────────────────────────────────────────
  - type: web
    name: nutrigestion-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        # Reemplaza por la URL pública del backend al hacer deploy
        # (ej: https://nutrigestion-api.onrender.com/api)
        sync: false
    routes:
      # SPA: cualquier ruta no encontrada cae a index.html para que el router de React tome control
      - type: rewrite
        source: /*
        destination: /index.html
